services:

  # ─── Gateway — public entry point (HTTP/HTTPS) ───────────────
  gateway:
    image: nginx:1.25-alpine
    container_name: squad-match-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - ./docker/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/gateway-ssl.conf.template:/etc/nginx/templates/gateway-ssl.conf.template:ro
      - ./docker/nginx/gateway-entrypoint.sh:/docker-entrypoint.d/99-gateway-ssl.sh:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend-nginx
    networks:
      - squad-network

  # ─── Certbot — Let's Encrypt certificate renewal ─────────────
  certbot:
    image: certbot/certbot:latest
    container_name: squad-match-certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - squad-network

  # ─── Frontend — Vue SPA (static nginx) ───────────────────────
  frontend:
    build:
      context: ./front-vue
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: squad-match-frontend
    restart: unless-stopped
    networks:
      - squad-network

  # ─── PHP-FPM Application ─────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: squad-match-app
    restart: unless-stopped
    volumes:
      - ./backend/storage:/var/www/html/storage
      - ./backend/bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      APP_NAME: ${APP_NAME:-Squad Match}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      APP_LOCALE: ${APP_LOCALE:-pl}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Warsaw}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-squad_match}
      DB_USERNAME: ${DB_USERNAME:-squad}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@squadmatch.app}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Squad Match}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - squad-network

  # ─── Queue Worker ────────────────────────────────────────────
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: squad-match-queue
    restart: unless-stopped
    volumes:
      - ./backend/storage:/var/www/html/storage
      - ./backend/bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-squad_match}
      DB_USERNAME: ${DB_USERNAME:-squad}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
    command: php artisan queue:work redis --queue=emails,notifications,default --tries=3 --sleep=3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - squad-network

  # ─── Scheduler ───────────────────────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: squad-match-scheduler
    restart: unless-stopped
    volumes:
      - ./backend/storage:/var/www/html/storage
      - ./backend/bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-squad_match}
      DB_USERNAME: ${DB_USERNAME:-squad}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
    command: php artisan schedule:work
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - squad-network

  # ─── Backend Nginx — PHP-FPM reverse proxy (internal) ────────
  backend-nginx:
    image: nginx:1.25-alpine
    container_name: squad-match-backend-nginx
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html:ro
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - squad-network

  # ─── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: squad-match-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-squad_match}
      POSTGRES_USER: ${DB_USERNAME:-squad}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-squad} -d ${DB_DATABASE:-squad_match}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - squad-network

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: squad-match-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - squad-network

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_certs:

networks:
  squad-network:
    driver: bridge
